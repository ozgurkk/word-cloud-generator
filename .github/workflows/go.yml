name: Go CI/CD to Azure Container Apps

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}                     # ör: wordcloudgenerator
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}         # ör: rg-wordcloud-dev
      CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }} # ör: ca-word-cloud-gen-dev
      IMAGE_NAME: word-cloud-generator
      TAG: ${{ github.sha }}
      REGISTRY: ${{ vars.ACR_NAME }}.azurecr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Test
        run: go test ./... -v

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ACR'ye docker push için auth (OIDC ile az cli kullanıyoruz)
      - name: ACR login
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          file: ./Dockerfile
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          # v2'nin beklediği parametre: imageToDeploy
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          # Container App'de targetPort 8888 olmalı (ilk oluştururken set ettin)
          